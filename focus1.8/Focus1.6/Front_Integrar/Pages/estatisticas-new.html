<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estatísticas - Focus Study</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" href="images/poppy.png">
    <link rel="stylesheet" href="css/estatisticas-new.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="dash-body">
    <header class="header">
        <div class="container header-inner">
            <a href="inicialusuario.html" class="logo"><span>Focus Study</span></a>
            <nav class="nav">
                <a href="inicialusuario.html" class="nav-link">Painel</a>
                <a href="horarios.html" class="nav-link">Horários</a>
                <a href="estatisticas-new.html" class="nav-link active">Estatísticas</a>
            </nav>
            <div class="header-actions">
                <a href="configuracoes.html" class="icon-btn" title="Configurações">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </a>
                <a href="perfil.html" class="user-avatar">
                    <img id="nav-avatar" src="https://ui-avatars.com/api/?name=Focado&background=06b6d4&color=fff" alt="Perfil">
                </a>
            </div>
        </div>
    </header>

    <main class="container dash-container">

        <!-- Cabeçalho da página -->
        <section class="stats-header">
            <div>
                <h1 class="dash-title">Suas <span class="gradient-text">Estatísticas</span></h1>
                <p id="current-date" class="dash-date">Carregando data...</p>
            </div>
            <div class="stats-header-actions">
                <div class="period-selector">
                    <button class="period-btn" data-period="daily">Diário</button>
                    <button class="period-btn" data-period="weekly">Semanal</button>
                    <button class="period-btn active" data-period="monthly">Mensal</button>
                    <button class="period-btn" data-period="semester">Semestral</button>
                    <button class="period-btn" data-period="annual">Anual</button>
                </div>
            </div>
        </section>

        <!-- Cards de resumo -->
        <div class="summary-grid">
            <div class="dash-card summary-card">
                <div class="summary-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                </div>
                <div>
                    <p class="summary-label">Missões cumpridas</p>
                    <p class="summary-value" id="stat-completed">0</p>
                </div>
            </div>
            <div class="dash-card summary-card">
                <div class="summary-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </div>
                <div>
                    <p class="summary-label">Taxa de conclusão</p>
                    <p class="summary-value" id="stat-rate">0%</p>
                </div>
            </div>
            <div class="dash-card summary-card">
                <div class="summary-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                    <p class="summary-label">Melhor dia</p>
                    <p class="summary-value" id="stat-best-day">--</p>
                </div>
            </div>
            <div class="dash-card summary-card">
                <div class="summary-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                </div>
                <div>
                    <p class="summary-label">Sequência atual</p>
                    <p class="summary-value" id="stat-streak">0</p>
                </div>
            </div>
        </div>

        <!-- Gráfico principal -->
        <div class="dash-card chart-card">
            <div class="chart-header">
                <h3>Progresso de Missões</h3>
                <div class="chart-nav">
                    <button class="chart-nav-btn" id="chart-prev" title="Período anterior">←</button>
                    <span class="chart-period-label" id="chart-label">--</span>
                    <button class="chart-nav-btn" id="chart-next" title="Próximo período">→</button>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="main-chart"></canvas>
            </div>
        </div>

        <!-- Heatmap anual -->
        <div class="dash-card heatmap-card">
            <div class="heatmap-header">
                <h3>Visão Anual</h3>
                <p class="heatmap-subtitle">Atividade ao longo do ano</p>
            </div>
            <div class="heatmap-wrapper">
                <div id="annual-heatmap"></div>
                <div class="heatmap-legend">
                    <span class="legend-label">Menos</span>
                    <div class="legend-cell" style="background:rgba(6,182,212,0.15)"></div>
                    <div class="legend-cell" style="background:rgba(6,182,212,0.4)"></div>
                    <div class="legend-cell" style="background:rgba(6,182,212,0.7)"></div>
                    <div class="legend-cell" style="background:rgb(6,182,212)"></div>
                    <span class="legend-label">Mais</span>
                </div>
            </div>
        </div>

    </main>

    <script src="js/script.js"></script>
    <script src="js/avatar.js"></script>
    <script src="js/api_estadisticas.js"></script>
    <script src="js/estatisticas-new.js"></script>
</body>
</html>
