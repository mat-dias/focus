<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil - Focus Study</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/perfil.css" />
  <link rel="icon" type="image/png" href="images/poppy.png">
</head>
<body class="dash-body">
  <header class="header">
    <div class="container header-inner">
      <a href="inicialusuario.html" class="logo"><span>Focus Study</span></a>
      <nav class="nav">
        <a href="inicialusuario.html" class="nav-link">Painel</a>
        <a href="horarios.html" class="nav-link">Horários</a>
        <a href="contato.html" class="nav-link">Contato</a>
        <a href="estatisticas-new.html" class="nav-link">Estatísticas</a>
      </nav>
      <div class="header-actions">
        <a href="configuracoes.html" class="icon-btn" title="Configurações">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </a>
        <a href="perfil.html" class="user-avatar active-avatar">
          <img id="nav-avatar" src="https://ui-avatars.com/api/?name=Focado&background=06b6d4&color=fff" alt="Perfil">
        </a>
      </div>
    </div>
  </header>

  <main class="container perfil-container">
    <section class="perfil-header-sec">
      <div>
        <h1 class="dash-title">Meu <span class="gradient-text">Perfil</span></h1>
        <p class="dash-date" id="current-date">Carregando...</p>
      </div>
    </section>

    <div class="perfil-layout">

      <!-- Coluna da foto e bio -->
      <div class="perfil-left">
        <div class="dash-card avatar-card">
          <div class="avatar-zone">
            <div class="avatar-wrapper" id="avatar-wrapper">
              <img id="profile-avatar-img" src="https://ui-avatars.com/api/?name=Focado&background=06b6d4&color=fff" alt="Avatar" />
              <button class="avatar-edit-btn" id="avatar-edit-btn" title="Alterar foto">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 014 4L7.5 20.5l-5 1 1-5L17 3z"/></svg>
              </button>
            </div>
            <input type="file" id="avatar-input" accept="image/*" style="display:none" />
          </div>
          <h2 class="profile-name" id="display-name">Usuário Focus</h2>
          <p class="profile-tag" id="display-tag">@focado</p>
          <p class="profile-bio" id="display-bio">Focado em crescer todos os dias.</p>
          <div class="profile-stats-row">
            <div class="pstat">
              <span class="pstat-val" id="pstat-streak">0</span>
              <span class="pstat-lbl">Sequência</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Formulário de edição -->
      <div class="perfil-right">
        <div class="dash-card edit-card">
          <h3 class="section-title">Informações Pessoais</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Nome</label>
              <input type="text" id="inp-name" placeholder="Seu nome" />
            </div>
            <div class="form-group">
              <label>Apelido (tag)</label>
              <div class="input-prefix-wrap">
                <span class="input-prefix">@</span>
                <input type="text" id="inp-tag" placeholder="seunome" />
              </div>
            </div>
          </div>
          <div class="form-save-row">
            <button class="btn btn-primary" id="save-personal">Salvar Informações</button>
            <span class="save-feedback" id="personal-feedback"></span>
          </div>
        </div>

        <div class="dash-card edit-card">
          <h3 class="section-title">Segurança & Acesso</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="inp-email" placeholder="seu@email.com" />
            </div>
            <div class="form-group">
              <label>Nova Senha</label>
              <div class="input-suffix-wrap">
                <input type="password" id="inp-pwd" placeholder="••••••••" />
                <button class="input-suffix-btn" id="toggle-pwd">
                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <div class="form-group full">
              <label>Confirmar Senha</label>
              <input type="password" id="inp-pwd-confirm" placeholder="••••••••" />
            </div>
          </div>
          <div class="form-save-row">
            <button class="btn btn-primary" id="save-security">Atualizar Credenciais</button>
            <span class="save-feedback" id="security-feedback"></span>
          </div>
        </div>

        <div class="dash-card edit-card logout-card">
          <h3 class="section-title">Sessão</h3>
          <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 16px;">Sair da sua conta e retornar à página de login.</p>
          <button class="btn btn-danger" id="btn-logout">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 4l5-5m0 0l-5-5m5 5H9"/></svg>
            Sair da Conta
          </button>
        </div>

      </div>
    </div>
  </main>

  <!-- Toast de confirmação -->
  <div class="toast" id="toast"></div>

  <script src="js/script.js"></script>
  <script src="js/perfil.js"></script>
  <script src="js/configuracoes.js" ></script>
</body>
</html>
