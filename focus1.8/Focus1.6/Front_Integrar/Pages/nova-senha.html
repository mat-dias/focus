<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Senha — Focus Study</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="css/nova-senha.css" />
  <link rel="icon" type="image/png" href="images/poppy.png">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">
        <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>Focus Study</span>
      </a>
      <!-- NavBar -->
      <nav class="nav">
        <a href="../index.html" class="nav-link">Início</a>
        <a href="sobre.html" class="nav-link">Sobre</a>
        <a href="contato.html" class="nav-link">Contato</a>
        <a href="instrucoes.html" class="nav-link">Instruções</a>
      </nav>

      <div class="header-actions">
        <a href="login.html" class="btn-user" title="Minha conta" aria-label="Minha conta">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-bg">
      <div class="auth-blob auth-blob-1"></div>
      <div class="auth-blob auth-blob-2"></div>
    </div>

    <div class="auth-card">
      <a href="index.html" class="auth-card-top">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>Focus Study</span>
      </a>

      <div class="auth-card-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </div>

      <h1 class="auth-card-title">Criar nova senha</h1>
      <p class="auth-card-desc">Escolha uma senha forte com no mínimo 6 caracteres para proteger sua conta.</p>

      <div id="alerta"></div>
      <!-- Form de Nova Senha -->
      <form id="formNovaSenha" novalidate>
        <div class="field">
          <label for="senha">Nova senha</label>
          <div class="field-wrap">
            <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" minlength="6" required />
            <button type="button" class="field-toggle" onclick="toggleSenha('senha', this)" aria-label="Mostrar senha">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="confirma">Confirmar nova senha</label>
          <div class="field-wrap">
            <input type="password" id="confirma" name="confirma" placeholder="Repita a senha" minlength="6" required />
            <button type="button" class="field-toggle" onclick="toggleSenha('confirma', this)"
              aria-label="Mostrar senha">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="field-error" id="aviso-senha"></div>
        </div>

        <button type="submit" class="btn-auth" id="btnSalvar">Salvar nova senha</button>
      </form>

      <a href="login.html" class="auth-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Voltar ao login
      </a>
    </div>
  </main>
  <!-- Scripts -->
  <script src="js/script.js"></script>
  <script src="js/nova-senha.js"></script>
</body>

</html>
